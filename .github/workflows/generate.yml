name: Generate CoderVPS Images

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      allow_rebuild_date_tag:
        description: "Allow rebuilding an existing immutable date tag"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 3 1 * *"

permissions:
  contents: write
  packages: write

concurrency:
  group: codervps-generated
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest -q

      - name: Lint
        run: uv run ruff check codervps tests

      - name: Refresh catalog
        run: uv run codervps refresh-catalog --output build/toolchains.json

      - name: Render generated tree
        run: uv run codervps render-generated --catalog build/toolchains.json --output build/generated

      - name: Prepare image matrix
        id: matrix
        run: uv run codervps build-matrix --catalog build/toolchains.json --format github-output >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: generated-tree
          path: build/generated

      - uses: actions/upload-artifact@v4
        with:
          name: matrix-json
          path: build/toolchains.json

  build:
    runs-on: ubuntu-24.04
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image tag already exists
        id: image
        run: |
          if docker buildx imagetools inspect "${{ matrix.image }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists, build will be skipped: ${{ matrix.image }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image does not exist yet, build is required: ${{ matrix.image }}"
          fi

      - name: Build and push
        if: ${{ steps.image.outputs.exists != 'true' || inputs.allow_rebuild_date_tag }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ matrix.image }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            NODE_VERSION=${{ matrix.node_version }}
            UV_VERSION=${{ matrix.uv_version }}
            CODE_SERVER_VERSION=${{ matrix.code_server_version }}
            SCCACHE_VERSION=${{ matrix.sccache_version }}
            SCCACHE_ASSET=${{ matrix.sccache_asset }}
            SCCACHE_SHA256=${{ matrix.sccache_sha256 }}
            LLVM_VERSION=${{ matrix.llvm_version }}

  publish-generated:
    runs-on: ubuntu-24.04
    needs: [prepare, build]
    if: ${{ !cancelled() && !failure() }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - uses: actions/download-artifact@v4
        with:
          name: generated-tree
          path: build/generated

      - uses: actions/download-artifact@v4
        with:
          name: matrix-json
          path: build/matrix

      - name: Regenerate with images
        run: |
          uv run codervps build-matrix \
            --catalog build/matrix/toolchains.json \
            --format json > build/images.json
          uv run codervps render-generated \
            --catalog build/matrix/toolchains.json \
            --output build/generated \
            --images build/images.json \
            --write-images-json

      - name: Publish generated branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin generated:refs/remotes/origin/generated || true
          git switch --orphan generated-work
          find . -mindepth 1 -maxdepth 1 ! -name build ! -name .git -exec rm -rf {} +
          cp -a build/generated/. .
          rm -rf build
          git add -A
          git commit -m "chore: update generated assets"
          git push origin HEAD:generated --force-with-lease
