name: coder-cde

services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: coder
    volumes:
      - coder-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder -d coder"]
      interval: 5s
      timeout: 5s
      retries: 20

  coder:
    image: ghcr.io/coder/coder:latest
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    group_add:
      - "988"
    environment:
      CODER_PG_CONNECTION_URL: "postgresql://coder:${POSTGRES_PASSWORD:?set
        POSTGRES_PASSWORD in .env}@database:5432/coder?sslmode=disable"
      CODER_HTTP_ADDRESS: "0.0.0.0:7080"
      CODER_ACCESS_URL: ${CODER_ACCESS_URL:?set CODER_ACCESS_URL in .env}
      CODER_WILDCARD_ACCESS_URL: ${CODER_WILDCARD_ACCESS_URL:?set CODER_WILDCARD_ACCESS_URL in .env}
      CODER_TELEMETRY_ENABLE: "false"
      CODER_MAX_TOKEN_LIFETIME: "87600h"
      CODER_MAX_ADMIN_TOKEN_LIFETIME: "87600h"
      CODER_DEFAULT_TOKEN_LIFETIME: "8760h"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/coder-cde/templates:/templates:ro
      - /opt/coder-cde/templates/devbox/extensions:/opt/coder-cde/extensions:ro
      - /opt/coder-cde/vsix:/opt/coder-cde/vsix:ro
    ports:
      - "127.0.0.1:7080:7080"

volumes:
  coder-postgres:
